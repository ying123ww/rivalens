# =============================================================================
# Rivalens Docker Compose — 一键部署
# =============================================================================
# 使用方法:
#   1. cp .env.example .env
#   2. 编辑 .env 填入你的 API Key 和密码
#   3. docker compose up -d
#   4. 宿主机 Nginx 反代 80 → 内部端口（详见 nginx-server.conf）
#
# 服务:
#   rivalens         — FastAPI 后端 (内部 8000)
#   rivalens-worker  — Celery 后台报告生成
#   rivalens-frontend— Next.js 前端 (内部 3000)
#   postgres         — PostgreSQL 16 + pgvector
#   redis            — Redis 7
# =============================================================================

services:
  # ── API 服务 ──────────────────────────────────────────────────────
  rivalens:
    image: rivalens/rivalens
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # LLM
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      FAST_LLM: ${FAST_LLM:-openai:gpt-4.1-mini}
      SMART_LLM: ${SMART_LLM:-openai:gpt-4.1-mini}
      STRATEGIC_LLM: ${STRATEGIC_LLM:-openai:gpt-4.1-mini}
      INDUSTRY_FALLBACK_LLM: ${INDUSTRY_FALLBACK_LLM:-}
      # 搜索
      RETRIEVER: ${RETRIEVER:-tavily}
      SCRAPER: ${SCRAPER:-bs}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      UNIFUNCS_API_KEY: ${UNIFUNCS_API_KEY:-}
      UNIFUNCS_DEEPSEARCH_BASE_URL: ${UNIFUNCS_DEEPSEARCH_BASE_URL:-}
      UNIFUNCS_DEEPSEARCH_MODEL: ${UNIFUNCS_DEEPSEARCH_MODEL:-s3-pro}
      UNIFUNCS_DEEPSEARCH_LANGUAGE: ${UNIFUNCS_DEEPSEARCH_LANGUAGE:-zh}
      # 嵌入
      EMBEDDING: ${EMBEDDING:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
      OPENAI_EMBEDDING_API_KEY: ${OPENAI_EMBEDDING_API_KEY:-}
      OPENAI_EMBEDDING_BASE_URL: ${OPENAI_EMBEDDING_BASE_URL:-}
      EMBEDDING_KWARGS: ${EMBEDDING_KWARGS:-}
      # 数据库（容器内 DNS，postgres/redis 为服务名）
      DATABASE_URL: postgresql://${POSTGRES_USER:-rivalens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rivalens}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Celery
      RIVALENS_CELERY_ENABLED: ${RIVALENS_CELERY_ENABLED:-true}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      # 认证
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:-86400}
      # 报告调优
      RIVALENS_MAX_ROOT_BRANCHES: ${RIVALENS_MAX_ROOT_BRANCHES:-20}
      RIVALENS_MAX_BRANCH_DEPTH: ${RIVALENS_MAX_BRANCH_DEPTH:-0}
      RIVALENS_MAX_EXPANSION_BRANCHES: ${RIVALENS_MAX_EXPANSION_BRANCHES:-0}
      RIVALENS_MAX_CONCURRENT_COLLECTIONS: ${RIVALENS_MAX_CONCURRENT_COLLECTIONS:-3}
      RIVALENS_MAX_SUBQUERY_CONCURRENCY: ${RIVALENS_MAX_SUBQUERY_CONCURRENCY:-2}
      RIVALENS_ANALYSIS_LLM: ${RIVALENS_ANALYSIS_LLM:-}
      RIVALENS_WRITER_LLM_CONCURRENCY: ${RIVALENS_WRITER_LLM_CONCURRENCY:-4}
      RIVALENS_LLM_RPM_LIMIT: ${RIVALENS_LLM_RPM_LIMIT:-60}
      # 功能开关
      RIVALENS_TRACE_PERSISTENCE_ENABLED: ${RIVALENS_TRACE_PERSISTENCE_ENABLED:-true}
      RIVALENS_SESSION_PERSISTENCE_ENABLED: ${RIVALENS_SESSION_PERSISTENCE_ENABLED:-true}
      RIVALENS_ENABLE_EVIDENCE_RAG: ${RIVALENS_ENABLE_EVIDENCE_RAG:-true}
      RIVALENS_AUTO_CREATE_TABLES: ${RIVALENS_AUTO_CREATE_TABLES:-true}
      RIVALENS_SCRAPED_SOURCE_CACHE_ENABLED: ${RIVALENS_SCRAPED_SOURCE_CACHE_ENABLED:-true}
      RIVALENS_WS_CELERY_ENABLED: ${RIVALENS_WS_CELERY_ENABLED:-false}
      # LangSmith
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-rivalens}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      # 路径
      DOC_PATH: ./my-docs
    volumes:
      - ./outputs:/usr/src/app/outputs:rw
      - ./logs:/usr/src/app/logs:rw
      - ./my-docs:/usr/src/app/my-docs:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────────────
  rivalens-worker:
    image: rivalens/rivalens
    build: .
    restart: unless-stopped
    command: >
      celery -A backend.server.celery_app:celery_app worker
      --loglevel=INFO
      --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      FAST_LLM: ${FAST_LLM:-openai:gpt-4.1-mini}
      SMART_LLM: ${SMART_LLM:-openai:gpt-4.1-mini}
      STRATEGIC_LLM: ${STRATEGIC_LLM:-openai:gpt-4.1-mini}
      INDUSTRY_FALLBACK_LLM: ${INDUSTRY_FALLBACK_LLM:-}
      RETRIEVER: ${RETRIEVER:-tavily}
      SCRAPER: ${SCRAPER:-bs}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      UNIFUNCS_API_KEY: ${UNIFUNCS_API_KEY:-}
      UNIFUNCS_DEEPSEARCH_BASE_URL: ${UNIFUNCS_DEEPSEARCH_BASE_URL:-}
      UNIFUNCS_DEEPSEARCH_MODEL: ${UNIFUNCS_DEEPSEARCH_MODEL:-s3-pro}
      UNIFUNCS_DEEPSEARCH_LANGUAGE: ${UNIFUNCS_DEEPSEARCH_LANGUAGE:-zh}
      EMBEDDING: ${EMBEDDING:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
      OPENAI_EMBEDDING_API_KEY: ${OPENAI_EMBEDDING_API_KEY:-}
      OPENAI_EMBEDDING_BASE_URL: ${OPENAI_EMBEDDING_BASE_URL:-}
      EMBEDDING_KWARGS: ${EMBEDDING_KWARGS:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rivalens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rivalens}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RIVALENS_CELERY_ENABLED: ${RIVALENS_CELERY_ENABLED:-true}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:-86400}
      RIVALENS_MAX_ROOT_BRANCHES: ${RIVALENS_MAX_ROOT_BRANCHES:-20}
      RIVALENS_MAX_BRANCH_DEPTH: ${RIVALENS_MAX_BRANCH_DEPTH:-0}
      RIVALENS_MAX_EXPANSION_BRANCHES: ${RIVALENS_MAX_EXPANSION_BRANCHES:-0}
      RIVALENS_MAX_CONCURRENT_COLLECTIONS: ${RIVALENS_MAX_CONCURRENT_COLLECTIONS:-3}
      RIVALENS_MAX_SUBQUERY_CONCURRENCY: ${RIVALENS_MAX_SUBQUERY_CONCURRENCY:-2}
      RIVALENS_ANALYSIS_LLM: ${RIVALENS_ANALYSIS_LLM:-}
      RIVALENS_WRITER_LLM_CONCURRENCY: ${RIVALENS_WRITER_LLM_CONCURRENCY:-4}
      RIVALENS_LLM_RPM_LIMIT: ${RIVALENS_LLM_RPM_LIMIT:-60}
      RIVALENS_TRACE_PERSISTENCE_ENABLED: ${RIVALENS_TRACE_PERSISTENCE_ENABLED:-true}
      RIVALENS_SESSION_PERSISTENCE_ENABLED: ${RIVALENS_SESSION_PERSISTENCE_ENABLED:-true}
      RIVALENS_ENABLE_EVIDENCE_RAG: ${RIVALENS_ENABLE_EVIDENCE_RAG:-true}
      RIVALENS_AUTO_CREATE_TABLES: ${RIVALENS_AUTO_CREATE_TABLES:-true}
      RIVALENS_SCRAPED_SOURCE_CACHE_ENABLED: ${RIVALENS_SCRAPED_SOURCE_CACHE_ENABLED:-true}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-rivalens}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      DOC_PATH: ./my-docs
    volumes:
      - ./outputs:/usr/src/app/outputs:rw
      - ./logs:/usr/src/app/logs:rw
      - ./my-docs:/usr/src/app/my-docs:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js 前端 ──────────────────────────────────────────────────
  rivalens-frontend:
    build:
      context: ./frontend/nextjs
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_RIVALENS_API_URL: ${NEXT_PUBLIC_RIVALENS_API_URL:-http://localhost:8000}
    depends_on:
      - rivalens

  # ── PostgreSQL 16 + pgvector ──────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rivalens}
      POSTGRES_USER: ${POSTGRES_USER:-rivalens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rivalens-pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rivalens} -d ${POSTGRES_DB:-rivalens}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - rivalens-redisdata:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── 持久化卷 ────────────────────────────────────────────────────────
volumes:
  rivalens-pgdata:
  rivalens-redisdata:
