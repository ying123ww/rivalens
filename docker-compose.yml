services:
  rivalens:
    pull_policy: build
    image: rivalens/rivalens
    build: ./
    environment: 
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-rivalens-local}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_WORKSPACE_ID: ${LANGSMITH_WORKSPACE_ID:-}
      LANGCHAIN_CALLBACKS_BACKGROUND: ${LANGCHAIN_CALLBACKS_BACKGROUND:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-true}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-rivalens-local}
      LOGGING_LEVEL: INFO
      # Image generation (optional - set to enable inline images in reports)
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      IMAGE_GENERATION_ENABLED: ${IMAGE_GENERATION_ENABLED:-false}
      IMAGE_GENERATION_MODEL: ${IMAGE_GENERATION_MODEL:-gemini-2.0-flash-preview-image-generation}
      IMAGE_GENERATION_MAX_IMAGES: ${IMAGE_GENERATION_MAX_IMAGES:-3}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rivalens}:${POSTGRES_PASSWORD:-123456}@postgres:5432/rivalens
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-rivalens-local-development-secret-change-before-production}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:-86400}
      RIVALENS_TRACE_PERSISTENCE_ENABLED: ${RIVALENS_TRACE_PERSISTENCE_ENABLED:-true}
      REDIS_URL: redis://:123456@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${PWD}/my-docs:/usr/src/app/my-docs:rw
      - ${PWD}/outputs:/usr/src/app/outputs:rw
      - ${PWD}/logs:/usr/src/app/logs:rw
    user: root
    restart: always
    ports:
      - 8000:8000
      
  rivalens-nextjs:
    pull_policy: build
    image: rivalens/rivalens-nextjs
    stdin_open: true
    environment:
      CHOKIDAR_USEPOLLING: "true"
      LOGGING_LEVEL: INFO
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      NEXT_PUBLIC_RIVALENS_API_URL: ${NEXT_PUBLIC_RIVALENS_API_URL}
    build:
      dockerfile: Dockerfile.dev
      context: frontend/nextjs
    volumes:
      - /app/node_modules
      - ./frontend/nextjs:/app
      - ./frontend/nextjs/.next:/app/.next
      - ./outputs:/app/outputs
    restart: always
    ports:
      - 3000:3000

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rivalens
      POSTGRES_USER: ${POSTGRES_USER:-rivalens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - rivalens-postgres-data:/var/lib/postgresql/data
    restart: always
    ports:
      - ${POSTGRES_PORT:-5433}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rivalens} -d rivalens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "123456"]
    volumes:
      - rivalens-redis-data:/data
    restart: always
    ports:
      - ${REDIS_PORT:-6380}:6379
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rivalens-postgres-data:
  rivalens-redis-data:
