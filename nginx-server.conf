# =============================================================================
# Rivalens — 宿主机 Nginx 反代配置
# 放到服务器: /etc/nginx/sites-available/rivalens
# 启用: ln -s /etc/nginx/sites-available/rivalens /etc/nginx/sites-enabled/
# =============================================================================

upstream rivalens_api {
    server 127.0.0.1:8000;
}

upstream rivalens_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name _;   # 改成你的域名，如 rivalens.example.com

    client_max_body_size 50m;

    # ── WebSocket ──────────────────────────────────────────────
    location /ws {
        proxy_pass http://rivalens_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 后端 API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://rivalens_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 报告下载 ──────────────────────────────────────────────
    location /report/ {
        proxy_pass http://rivalens_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 文件上传 ──────────────────────────────────────────────
    location /upload/ {
        proxy_pass http://rivalens_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /files/ {
        proxy_pass http://rivalens_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Swagger / ReDoc ───────────────────────────────────────
    location /docs {
        proxy_pass http://rivalens_api;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://rivalens_api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://rivalens_api;
        proxy_set_header Host $host;
    }

    # ── 前端 ──────────────────────────────────────────────────
    location / {
        proxy_pass http://rivalens_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
